{# Error fragment for retag submit failures. Required context: cc_code, question_id, message. #}
<div id="retag-error-{{ question_id }}"
     class="mt-3 rounded-md border border-red-200 bg-red-50 dark:bg-red-900/20 dark:border-red-800 px-3 py-2 text-sm text-red-700 dark:text-red-300">
  <strong class="font-semibold">Re-tag failed:</strong> {{ message }}
  <button type="button"
          class="ml-2 text-xs underline"
          hx-get="/mastery/{{ cc_code }}/questions/{{ question_id }}/retag-form"
          hx-target="#retag-error-{{ question_id }}"
          hx-swap="outerHTML">
    Try again
  </button>
</div>
