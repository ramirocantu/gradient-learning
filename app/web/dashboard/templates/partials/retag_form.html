{# Inline re-tag form. Required context: cc_code, question_id, all_ccs, initial_topics, card, existing_cc_codes, existing_skills. #}
<div id="retag-form-{{ question_id }}" class="mt-3 border-t border-gray-100 dark:border-gray-800 pt-3">
  <form hx-post="/mastery/{{ cc_code }}/questions/{{ question_id }}/retag"
        hx-target="#question-card-{{ question_id }}"
        hx-swap="outerHTML"
        class="space-y-3 bg-gray-50 dark:bg-gray-800/40 rounded-lg p-4 border border-gray-200 dark:border-gray-700">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1" for="retag-cc-{{ question_id }}">Content category</label>
        <select id="retag-cc-{{ question_id }}"
                name="target_cc_code"
                required
                class="w-full rounded-md border border-gray-300 dark:border-gray-700 dark:bg-gray-900 px-2 py-1.5 text-sm"
                hx-get="/mastery/{{ cc_code }}/topic-options"
                hx-target="#retag-topic-{{ question_id }}"
                hx-trigger="change"
                hx-include="this"
                hx-vals='js:{cc_code: event.target.value}'>
          {% for cc in all_ccs %}
            {% set already = cc.code in existing_cc_codes %}
            <option value="{{ cc.code }}"
                    {% if cc.code == cc_code %}selected{% endif %}
                    {% if already %}disabled class="text-gray-400"{% endif %}>
              {{ cc.code }} — {{ cc.name }}{% if already %} (already tagged){% endif %}
            </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1" for="retag-topic-{{ question_id }}-wrap">Topic (optional)</label>
        <select id="retag-topic-{{ question_id }}"
                name="target_topic_id"
                class="w-full rounded-md border border-gray-300 dark:border-gray-700 dark:bg-gray-900 px-2 py-1.5 text-sm">
          {% with topics = initial_topics %}
            {% include "partials/topic_options.html" %}
          {% endwith %}
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1" for="retag-skill-{{ question_id }}">Skill (optional)</label>
        <select id="retag-skill-{{ question_id }}"
                name="target_skill"
                class="w-full rounded-md border border-gray-300 dark:border-gray-700 dark:bg-gray-900 px-2 py-1.5 text-sm">
          <option value="">None</option>
          {% for n in [1, 2, 3, 4] %}
            {% set already = n in existing_skills %}
            <option value="{{ n }}" {% if already %}disabled{% endif %}>
              {{ n }}{% if already %} (already tagged){% endif %}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="flex items-center gap-2 pt-1">
      <button type="submit"
              class="text-xs font-medium px-3 py-1.5 rounded-md bg-indigo-600 text-white hover:bg-indigo-700">
        Save manual tag
      </button>
      <button type="button"
              class="text-xs font-medium px-3 py-1.5 rounded-md border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800"
              onclick="document.getElementById('retag-form-{{ question_id }}').remove()">
        Cancel
      </button>
    </div>
  </form>
</div>
