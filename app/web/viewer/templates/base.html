<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}MCAT Coach — Capture Browser{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>
    <style>
      .prose-capture img { max-width: 100%; height: auto; display: inline-block; }
      .prose-capture table { border-collapse: collapse; }
      .prose-capture td, .prose-capture th { border: 1px solid #4b5563; padding: 4px 8px; }
      .prose-capture { line-height: 1.5; }
      img[data-missing="true"] {
        display: inline-block;
        min-width: 120px;
        min-height: 60px;
        background: repeating-linear-gradient(45deg, #7f1d1d, #7f1d1d 8px, #991b1b 8px, #991b1b 16px);
        border: 2px dashed #fecaca;
      }
    </style>
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="bg-slate-800 border-b border-slate-700 px-4 py-3">
      <div class="max-w-7xl mx-auto flex flex-wrap items-center gap-4">
        <a href="/viewer/captures" class="font-semibold text-emerald-400">Capture Browser</a>
        <a href="/viewer/captures" class="hover:text-emerald-300">Captures</a>
        <span class="text-slate-500">|</span>
        <label class="text-xs text-slate-400 flex items-center gap-1 select-none">
          <input id="autorefresh-toggle" type="checkbox" class="accent-emerald-500">
          auto-refresh
        </label>
        <span id="autorefresh-status" class="text-xs text-slate-500"></span>
      </div>
    </nav>
    <main class="max-w-7xl mx-auto p-4">
      {% block content %}{% endblock %}
    </main>
    <script>
      // Auto-refresh: poll /viewer/_version every 5s; reload when value
      // changes. Disabled while any input/textarea/select is focused, so
      // filter forms and the raw-html load don't get nuked mid-keystroke.
      // Absolute viewer-prefixed path (was `/_version` pre-R.1 when the
      // viewer ran on its own port; post-R.1 it's mounted at /viewer).
      (function () {
        const STORAGE_KEY = "viewer.autorefresh";
        const INTERVAL_MS = 5000;
        const toggle = document.getElementById("autorefresh-toggle");
        const status = document.getElementById("autorefresh-status");
        let last = null;
        let timer = null;

        function isInputFocused() {
          const a = document.activeElement;
          return a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName);
        }

        async function tick() {
          if (document.hidden || isInputFocused()) return;
          try {
            const r = await fetch("/viewer/_version", { cache: "no-store" });
            if (!r.ok) return;
            const { v } = await r.json();
            if (last === null) { last = v; return; }
            if (v !== last) { window.location.reload(); }
          } catch (_) { /* ignore transient errors */ }
        }

        function start() {
          if (timer) return;
          status.textContent = "on";
          tick();
          timer = setInterval(tick, INTERVAL_MS);
        }
        function stop() {
          status.textContent = "off";
          if (timer) { clearInterval(timer); timer = null; }
        }

        const stored = localStorage.getItem(STORAGE_KEY);
        const enabled = stored === null ? true : stored === "1";
        toggle.checked = enabled;
        enabled ? start() : stop();

        toggle.addEventListener("change", () => {
          localStorage.setItem(STORAGE_KEY, toggle.checked ? "1" : "0");
          toggle.checked ? start() : stop();
        });
      })();
    </script>
  </body>
</html>
