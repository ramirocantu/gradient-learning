services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gradient}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gradient_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gradient}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradient} -d ${POSTGRES_DB:-gradient}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
